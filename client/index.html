<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Family archive</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="app-header">
    <div class="app-header-inner">
      <h1 class="app-title">Family Archive</h1>
      <nav class="tab-nav">
        <a href="#/timeline" class="nav-link active">Timeline</a>
        <a href="#/dashboard" class="nav-link">Dashboard</a>
      </nav>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <!-- ── Asset detail overlay ── -->
  <div id="asset-overlay" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlay-backdrop" id="overlay-backdrop"></div>
    <div class="overlay-panel">
      <button class="overlay-close" id="overlay-close"><img src="/icons/close.svg" alt="Close"></button>
      <button class="overlay-menu" id="overlay-menu"><img src="/icons/menu-dots.svg" alt="Menu"></button>
      <button class="overlay-nav overlay-prev" id="overlay-prev" aria-label="Previous"><img src="/icons/chevron-small-left.svg" alt="Previous"></button>
      <button class="overlay-nav overlay-next" id="overlay-next" aria-label="Next"><img src="/icons/chevron-small-right.svg" alt="Next"></button>
      <div id="overlay-content" class="overlay-content"></div>
    </div>
  </div>

  <!-- ── Upload modal ── -->
  <div id="upload-modal" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlay-backdrop" id="upload-backdrop"></div>
    <div class="upload-panel">
      <button class="overlay-close" id="upload-close" aria-label="Close">×</button>
      <div id="upload-content"></div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
